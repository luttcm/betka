name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bet_mvp_test
          POSTGRES_USER: bet_user
          POSTGRES_PASSWORD: bet_password
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Unit tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build API
        run: go build ./cmd/api

      - name: Build Worker
        run: go build ./cmd/worker
